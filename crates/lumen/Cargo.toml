[package]
name = "lumen"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish = false

[dependencies]
lumen-core = { workspace = true }
lumen-render = { workspace = true }
lumen-layout = { workspace = true }
lumen-text = { workspace = true }
lumen-widgets = { workspace = true }

# The desktop window shell (winit) is desktop-only; mobile targets use the
# platform shells (lumen-shell-android / -ios) instead, so excluding it here
# keeps winit → android-activity out of mobile builds.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
lumen-shell = { workspace = true }
