# cargo-deny configuration — enforces ADR-020 (MIT OR Apache-2.0; compatible deps only).

[licenses]
# SPDX identifiers allowed for the dependency closure. Our own crates are
# MIT OR Apache-2.0; the rest are permissive licenses compatible with that.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are path deps without a version requirement; that is
# not a real wildcard-dependency risk.
allow-wildcard-paths = true

[advisories]
yanked = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
