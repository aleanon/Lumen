# 32-way parallel LLVM debug builds exceed this box's memory (62 GiB, swap
# 2 GiB): rustc hit "LLVM ERROR: out of memory", and memory-pressure kills
# mid-write are the prime suspect for three target/-and-.git corruption
# waves (2026-07-10). Bound build parallelism; raise if the workspace or
# the machine changes.
[build]
jobs = 12

# Disk-pressure mitigations (2026-07-11, after the third 100%-full incident:
# a day of dev cycles regrew target/ to 151 GB). Line-tables keep usable
# backtraces at a fraction of full debuginfo; incremental caches were both
# multi-GB and the corruption-prone artifact class. Revert if you need full
# debugger variable info.
[env]
CARGO_INCREMENTAL = "0"
